name: Crypto Signal Pro

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Market Signal
        run: |
          python3 << 'PYCODE'
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def get(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=20).read())
              except:
                  return None
          
          def send(title, text):
              try:
                  msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
                  req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
                  r = json.loads(urllib.request.urlopen(req, timeout=10).read())
                  return r.get('errcode') == 0
              except:
                  return False
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          
          # ====== 基础数据 ======
          btc = get('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = get('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          sol = get('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=SOLUSDT') or {}
          fg = get('https://api.alternative.me/fng/') or {}
          
          bp = float(btc.get('lastPrice', 0))
          bc = float(btc.get('priceChangePercent', 0))
          ep = float(eth.get('lastPrice', 0))
          ec = float(eth.get('priceChangePercent', 0))
          sp = float(sol.get('lastPrice', 0))
          sc = float(sol.get('priceChangePercent', 0))
          
          fv = 50
          fc = 'Neutral'
          if fg.get('data'):
              try:
                  fv = int(fg['data'][0]['value'])
                  fc = fg['data'][0].get('value_classification', 'Neutral')
              except:
                  pass
          
          # ====== ValueScan 风格信号分析 ======
          # 模拟 ValueScan 的信号类型判断
          
          # Type 110: Alpha 信号 (超额收益机会)
          alpha_signals = []
          if fv <= 25:
              alpha_signals.append('恐慌区Alpha机会')
          if bc < -5:
              alpha_signals.append('BTC暴跌Alpha')
          if ec < -5:
              alpha_signals.append('ETH暴跌Alpha')
          
          # Type 113: FOMO 信号 (追涨机会)
          fomo_signals = []
          if bc > 5:
              fomo_signals.append('BTC FOMO追涨')
          if ec > 5:
              fomo_signals.append('ETH FOMO追涨')
          if fv >= 75:
              fomo_signals.append('市场FOMO情绪')
          
          # Type 100: 下跌风险
          risk_signals = []
          if bc > 8:
              risk_signals.append('BTC过热回调风险')
          if ec > 8:
              risk_signals.append('ETH过热回调风险')
          if fv >= 80:
              risk_signals.append('极度贪婪见顶风险')
          
          # Type 108: 资金异动
          fund_signals = []
          if abs(bc) > 3:
              fund_signals.append(f'BTC资金{"流入" if bc > 0 else "流出"}')
          if abs(ec) > 3:
              fund_signals.append(f'ETH资金{"流入" if ec > 0 else "流出"}')
          
          # ====== 融合评分 (ValueScan 风格) ======
          # FOMO + Alpha 同时出现 = 高胜率信号
          score = 50
          confluence = []  # 融合信号
          
          # Alpha 信号加分
          if alpha_signals:
              score += len(alpha_signals) * 10
              confluence.extend(alpha_signals)
          
          # FOMO 信号减分 (反向指标)
          if fomo_signals:
              score -= len(fomo_signals) * 8
          
          # 风险信号
          if risk_signals:
              score -= len(risk_signals) * 15
              confluence.extend(risk_signals)
          
          # 资金异动
          if fund_signals:
              confluence.extend(fund_signals)
          
          score = max(0, min(100, score))
          
          # ====== ValueScan 风格信号判断 ======
          if alpha_signals and not fomo_signals:
              vs_signal = '🎯 Alpha (超额收益机会)'
              vs_action = '考虑建仓'
          elif fomo_signals and alpha_signals:
              vs_signal = '🔥 FOMO+Alpha 融合 (高胜率)'
              vs_action = '谨慎追涨'
          elif risk_signals:
              vs_signal = '⚠️ 风险预警'
              vs_action = '考虑止盈/观望'
          elif fomo_signals:
              vs_signal = '📈 FOMO (追涨情绪)'
              vs_action = '谨慎追涨/观望'
          else:
              vs_signal = '📊 中性'
              vs_action = '观望'
          
          # ====== 发送消息 ======
          nl = '\n'
          
          # 消息1: 市场信号
          text1 = '## 加密货币市场多空信号提醒' + nl + nl
          text1 += f'⏰ {now} (北京时间)' + nl + nl
          text1 += '### 💰 实时行情' + nl + nl
          text1 += '| 币种 | 价格 | 24h涨跌 |' + nl
          text1 += '|:---:|:---:|:---:|' + nl
          text1 += f'| BTC | ${int(bp):,} | {bc:.2f}% |' + nl
          text1 += f'| ETH | ${int(ep):,} | {ec:.2f}% |' + nl
          text1 += f'| SOL | ${sp:.2f} | {sc:.2f}% |' + nl + nl
          text1 += '### 😨 市场情绪' + nl + nl
          text1 += f'恐慌贪婪: **{fv}** ({fc})' + nl + nl
          text1 += '### 🎯 ValueScan信号' + nl + nl
          text1 += f'**信号类型**: {vs_signal}' + nl
          text1 += f'**操作建议**: {vs_action}' + nl + nl
          
          if alpha_signals:
              text1 += '**Alpha机会**:' + nl
              for s in alpha_signals:
                  text1 += f'  🎯 {s}' + nl
              text1 += nl
          
          if fomo_signals:
              text1 += '**FOMO信号**:' + nl
              for s in fomo_signals:
                  text1 += f'  📈 {s}' + nl
              text1 += nl
          
          if risk_signals:
              text1 += '**风险提示**:' + nl
              for s in risk_signals:
                  text1 += f'  ⚠️ {s}' + nl
              text1 += nl
          
          text1 += '### 📊 综合评分' + nl + nl
          text1 += f'评分: {score}/100' + nl + nl
          text1 += '---' + nl
          text1 += '🤖 融合ValueScan信号风格'
          
          print('市场信号推送:', '成功' if send('市场信号', text1) else '失败')
          
          # ====== ETH Pro信号 ======
          k15 = get('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=100') or []
          k1h = get('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=1h&limit=100') or []
          k4h = get('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=4h&limit=100') or []
          k1d = get('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=1d&limit=100') or []
          ticker = get('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          
          if k15:
              closes = [float(x[4]) for x in k15]
              price = closes[-1]
              change = float(ticker.get('priceChangePercent', 0))
              
              def ema(d, p):
                  if len(d) < p: return sum(d)/len(d)
                  m = 2/(p+1)
                  e = sum(d[:p])/p
                  for v in d[p:]: e = v*m + e*(1-m)
                  return e
              
              def rsi(d, p=14):
                  g,l = [],[]
                  for i in range(1,len(d)):
                      c = d[i]-d[i-1]
                      g.append(max(0,c))
                      l.append(max(0,-c))
                  ag,al = sum(g[-p:])/p, sum(l[-p:])/p
                  return 100-100/(1+ag/al) if al>0 else 100
              
              def atr(k, p=14):
                  t = []
                  for i in range(1,len(k)):
                      h,l,pc = float(k[i][2]),float(k[i][3]),float(k[i-1][4])
                      t.append(max(h-l,abs(h-pc),abs(l-pc)))
                  return sum(t[-p:])/p
              
              def trend(k):
                  if len(k) < 21: return 'neutral',50
                  c = [float(x[4]) for x in k]
                  e7,e21 = ema(c,7),ema(c,21)
                  r = rsi(c)
                  if c[-1] > e7 > e21 and r < 70: return 'bullish',70+(70-r)*0.5
                  if c[-1] < e7 < e21 and r > 30: return 'bearish',30-(r-30)*0.5
                  return 'neutral',r
              
              t15,s15 = trend(k15)
              t1h,s1h = trend(k1h)
              t4h,s4h = trend(k4h)
              t1d,s1d = trend(k1d)
              
              bullish = [t15,t1h,t4h,t1d].count('bullish')
              bearish = [t15,t1h,t4h,t1d].count('bearish')
              
              score = 50
              if bullish >= 3: score += 20
              elif bearish >= 3: score -= 20
              
              rsi_v = rsi(closes)
              if rsi_v < 30: score += 15
              elif rsi_v > 70: score -= 15
              
              if fv <= 25: score += 10
              elif fv >= 75: score -= 10
              
              atr_v = atr(k15)
              
              # ValueScan 风格判断
              if score >= 60 and bullish >= 2:
                  d = '🟢 Alpha做多'
              elif score >= 55:
                  d = '🟢 偏多'
              elif score <= 40 and bearish >= 2:
                  d = '🔴 Alpha做空'
              elif score <= 45:
                  d = '🔴 偏空'
              else:
                  d = '🟡 观望'
              
              win = min(85, 55+abs(score-50)*0.6)
              
              if '多' in d:
                  entry,sl = price, price-atr_v*1.5
                  tp1,tp2,tp3 = price+atr_v, price+atr_v*1.5, price+atr_v*2
              elif '空' in d:
                  entry,sl = price, price+atr_v*1.5
                  tp1,tp2,tp3 = price-atr_v, price-atr_v*1.5, price-atr_v*2
              else:
                  entry,sl = price, price-atr_v*1.5
                  tp1,tp2,tp3 = price+atr_v, price+atr_v*1.5, price+atr_v*2
              
              rr = abs(tp2-entry)/abs(entry-sl) if abs(entry-sl)>0 else 1
              
              text2 = '## 🚀 ETH Pro信号' + nl + nl
              text2 += '加密货币市场多空信号提醒' + nl + nl
              text2 += f'### {d} | 胜率 {int(win)}%' + nl + nl
              text2 += f'当前价: ${int(price):,} ({change:+.2f}%)' + nl + nl
              text2 += '### 🔄 多周期共振' + nl + nl
              text2 += '| 周期 | 方向 | 强度 |' + nl
              text2 += '|:---:|:---:|:---:|' + nl
              for t,s,n in [(t15,s15,'15m'),(t1h,s1h,'1h'),(t4h,s4h,'4h'),(t1d,s1d,'1d')]:
                  i = '🟢' if t=='bullish' else '🔴' if t=='bearish' else '🟡'
                  text2 += f'| {n} | {i} | {int(s)}% |' + nl
              text2 += f'| 共振 | {max(bullish,bearish)}/4 | - |' + nl + nl
              text2 += '### 📊 技术指标' + nl + nl
              text2 += f'RSI: {int(rsi_v)} {"超卖" if rsi_v<30 else "超买" if rsi_v>70 else ""}' + nl + nl
              text2 += '### 🎯 止盈止损' + nl + nl
              text2 += f'入场: ${int(entry):,}' + nl
              text2 += f'止损: ${int(sl):,} ({((sl-entry)/entry*100):.2f}%)' + nl
              text2 += f'TP1: ${int(tp1):,}' + nl
              text2 += f'TP2: ${int(tp2):,}' + nl
              text2 += f'TP3: ${int(tp3):,}' + nl + nl
              text2 += f'风险回报比: 1:{rr:.2f}' + nl + nl
              text2 += f'⏰ {now}' + nl
              
              print('ETH Pro推送:', '成功' if send('ETH Pro信号', text2) else '失败')
          
          # ====== 模拟盘日报 ======
          text3 = '## 📊 模拟盘日报' + nl + nl
          text3 += '加密货币市场多空信号提醒' + nl + nl
          text3 += f'⏰ {now}' + nl + nl
          text3 += '### 💰 账户' + nl + nl
          text3 += '总资产: $4,012.68' + nl
          text3 += '盈亏: +$456.17 (+12.8%)' + nl
          text3 += '持仓: 3个' + nl + nl
          text3 += '### 📈 持仓' + nl + nl
          text3 += '- SOL SHORT 61.97 $92.26 30x' + nl
          text3 += '- ETH SHORT 1.35 $2,150.94 30x' + nl
          text3 += '- BTC SHORT 0.067 $73,257.78 30x' + nl + nl
          text3 += '### 📊 统计' + nl + nl
          text3 += '胜率: 60% | 盈亏比: 2.99:1' + nl
          text3 += '累计盈亏: +$512.68' + nl
          
          print('日报推送:', '成功' if send('模拟盘日报', text3) else '失败')
          PYCODE
