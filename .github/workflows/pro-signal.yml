name: Pro Signal Push

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. BTC Pro Signal
        run: |
          python3 -c "
          import urllib.request, json, math
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          nl = chr(10)
          
          def fetch(url, timeout=20):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=timeout).read())
              except: return None
          
          def send(title, text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              return json.loads(urllib.request.urlopen(req, timeout=10).read().get('errcode') == 0
          
          def ema(data, period):
              if len(data) < period: return data[-1]
              k = 2 / (period + 1)
              e = sum(data[:period]) / period
              for v in data[period:]: e = v * k + e * (1 - k)
              return e
          
          def rsi(data, period=14):
              if len(data) < period + 1: return 50
              gains, losses = [], []
              for i in range(1, len(data)):
                  c = data[i] - data[i-1]
                  gains.append(max(0, c))
                  losses.append(max(0, -c))
              ag = sum(gains[-period:]) / period
              al = sum(losses[-period:]) / period
              return 100 - 100 / (1 + ag / al) if al > 0 else 100
          
          def atr(klines, period=14):
              trs = []
              for i in range(1, len(klines)):
                  h, l, pc = float(klines[i][2]), float(klines[i][3]), float(klines[i-1][4])
                  trs.append(max(h-l, abs(h-pc), abs(l-pc)))
              return sum(trs[-period:]) / period
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          
          # ===== 获取数据 =====
          k1h = fetch('https://data-api.binance.vision/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=100') or []
          k4h = fetch('https://data-api.binance.vision/api/v3/klines?symbol=BTCUSDT&interval=4h&limit=50') or []
          ticker = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          if not k1h:
              print('无数据')
              exit(0)
          
          closes = [float(k[4]) for k in k1h]
          price = closes[-1]
          atr_val = atr(k1h)
          
          # ===== 多维度评分 =====
          score = 50
          signals = []
          warnings = []
          
          # 1. 趋势分析 (±20分)
          e7, e21, e50 = ema(closes, 7), ema(closes, 21), ema(closes, 50)
          if e7 > e21 > e50:
              score += 15
              signals.append('✅ 多头排列 (7>21>50)')
          elif e7 < e21 < e50:
              score -= 15
              signals.append('🔴 空头排列 (7<21<50)')
          
          # 4H趋势
          if k4h:
              c4 = [float(k[4]) for k in k4h]
              e4_21 = ema(c4, 21)
              if price > e4_21:
                  score += 5
                  signals.append('✅ 4H趋势向上')
              else:
                  score -= 5
          
          # 2. RSI分析 (±15分)
          r = rsi(closes)
          if r < 25:
              score += 15
              signals.append(f'✅ RSI极度超卖 ({r:.0f})')
          elif r < 35:
              score += 10
              signals.append(f'✅ RSI超卖 ({r:.0f})')
          elif r > 75:
              score -= 15
              warnings.append(f'⚠️ RSI极度超买 ({r:.0f})')
          elif r > 65:
              score -= 10
              warnings.append(f'⚠️ RSI超买 ({r:.0f})')
          
          # 3. MACD (±10分)
          e12, e26 = ema(closes, 12), ema(closes, 26)
          macd = e12 - e26
          if macd > 0:
              score += 10
              signals.append('✅ MACD金叉')
          else:
              score -= 5
          
          # 4. 布林带位置 (±10分)
          sma20 = sum(closes[-20:]) / 20
          std = math.sqrt(sum((c - sma20)**2 for c in closes[-20:]) / 20)
          bb_upper, bb_lower = sma20 + 2*std, sma20 - 2*std
          bb_pos = (price - bb_lower) / (bb_upper - bb_lower)
          
          if bb_pos < 0.2:
              score += 10
              signals.append('✅ 触及布林下轨')
          elif bb_pos > 0.8:
              score -= 10
              warnings.append('⚠️ 触及布林上轨')
          
          # 5. 恐慌贪婪 (±15分)
          fg_val = int(fg['data'][0]['value']) if fg.get('data') else 50
          fg_class = fg['data'][0].get('value_classification', 'Neutral') if fg.get('data') else 'Neutral'
          
          if fg_val <= 15:
              score += 15
              signals.append(f'✅ 极度恐慌 ({fg_val}) 历史买点')
          elif fg_val <= 25:
              score += 12
              signals.append(f'✅ 恐慌 ({fg_val}) 看涨')
          elif fg_val >= 85:
              score -= 15
              warnings.append(f'⚠️ 极度贪婪 ({fg_val}) 高风险')
          elif fg_val >= 75:
              score -= 12
              warnings.append(f'⚠️ 贪婪 ({fg_val}) 警惕')
          
          # 6. 24h涨跌 (±10分)
          change = float(ticker.get('priceChangePercent', 0))
          if change < -5:
              score += 10
              signals.append(f'✅ 暴跌{change:.1f}% 抄底机会')
          elif change > 5:
              score -= 10
              warnings.append(f'⚠️ 暴涨{change:.1f}% 追高风险')
          
          score = max(0, min(100, score))
          
          # ===== 信号等级 =====
          if score >= 75:
              sig = '🚀 强多'
              action = '做多'
              lev = 5
          elif score >= 60:
              sig = '🟢 偏多'
              action = '做多'
              lev = 3
          elif score <= 25:
              sig = '🔴 强空'
              action = '做空'
              lev = 5
          elif score <= 40:
              sig = '🟠 偏空'
              action = '做空'
              lev = 3
          else:
              sig = '⚪ 中性'
              action = '观望'
              lev = 1
          
          # ===== 止损止盈 =====
          if action == '做多':
              sl = price - 2 * atr_val
              tp1 = price + 1.5 * atr_val
              tp2 = price + 3 * atr_val
              tp3 = price + 5 * atr_val
          elif action == '做空':
              sl = price + 2 * atr_val
              tp1 = price - 1.5 * atr_val
              tp2 = price - 3 * atr_val
              tp3 = price - 5 * atr_val
          else:
              sl = price - 2 * atr_val
              tp1 = price + 1.5 * atr_val
              tp2 = price + 3 * atr_val
              tp3 = tp2
          
          # 胜率估算
          win_rate = min(85, max(35, 50 + (score - 50) * 0.7))
          
          # 构建消息
          signal_text = nl.join([f'- {s}' for s in signals]) if signals else '- 暂无'
          warn_text = nl.join([f'- {w}' for w in warnings]) if warnings else '- 无'
          
          t = '## BTC Pro信号 ' + sig + nl + nl + '加密货币市场多空信号提醒' + nl + nl + '⏰ ' + now + nl + nl
          t += '### 💰 当前价格' + nl + '**$' + str(int(price)) + '** (' + ('+' if change >= 0 else '') + str(round(change, 2)) + '%)' + nl + nl
          t += '### 🎯 综合评分' + nl + '**' + str(score) + '/100** | 等级: ' + sig + ' | 预估胜率: ' + str(int(win_rate)) + '%' + nl + nl
          t += '### 📊 技术指标' + nl + '| 指标 | 数值 | 信号 |' + nl + '|:---:|---:|:---:|' + nl
          t += '| EMA7 | $' + str(int(e7)) + ' | ' + ('多' if price > e7 else '空') + ' |' + nl
          t += '| EMA21 | $' + str(int(e21)) + ' | ' + ('多' if price > e21 else '空') + ' |' + nl
          t += '| RSI | ' + str(int(r)) + ' | ' + ('超卖' if r < 35 else '超买' if r > 65 else '中性') + ' |' + nl
          t += '| MACD | ' + ('+' if macd > 0 else '-') + ' | ' + ('金叉' if macd > 0 else '死叉') + ' |' + nl
          t += '| 布林位置 | ' + str(int(bb_pos * 100)) + '% | ' + ('下轨' if bb_pos < 0.3 else '上轨' if bb_pos > 0.7 else '中轨') + ' |' + nl + nl
          t += '### 😨 市场情绪' + nl + '恐慌贪婪: **' + str(fg_val) + '** (' + fg_class + ')' + nl + nl
          t += '### ✅ 看涨信号' + nl + signal_text + nl + nl
          t += '### ⚠️ 风险提示' + nl + warn_text + nl + nl
          t += '### 💰 交易计划' + nl + '| 项目 | 价格 |' + nl + '|:---:|---:|' + nl
          t += '| 入场价 | $' + str(int(price)) + ' |' + nl
          t += '| 止损 | $' + str(int(sl)) + ' |' + nl
          t += '| 止盈1 | $' + str(int(tp1)) + ' |' + nl
          t += '| 止盈2 | $' + str(int(tp2)) + ' |' + nl
          t += '| 止盈3 | $' + str(int(tp3)) + ' |' + nl
          t += '| 建议杠杆 | ' + str(lev) + 'x |' + nl + nl
          t += '### 💡 操作建议' + nl + '> ' + action + ('，严格止损' if action != '观望' else '，等待更明确信号') + nl + nl
          t += '---' + nl + 'BTC Pro 高胜率信号 | 每30分钟更新'
          
          print('BTC推送:', '成功' if send('BTC Pro信号 ' + sig, t) else '失败')
          "

