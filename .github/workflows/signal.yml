name: Signal Push

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: BTC Signal
        run: |
          python3 << 'EOF'
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=20).read())
              except:
                  return None
          
          def send_msg(title, text):
              try:
                  msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
                  req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
                  resp = urllib.request.urlopen(req, timeout=10)
                  result = json.loads(resp.read())
                  print(f'钉钉响应: {result}')
                  return result.get('errcode') == 0
              except Exception as e:
                  print(f'发送失败: {e}')
                  return False
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          print(f'执行时间: {now}')
          
          btc = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          sol = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=SOLUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          bp = float(btc.get('lastPrice', 0))
          bc = float(btc.get('priceChangePercent', 0))
          ep = float(eth.get('lastPrice', 0))
          ec = float(eth.get('priceChangePercent', 0))
          sp = float(sol.get('lastPrice', 0))
          sc = float(sol.get('priceChangePercent', 0))
          
          fv = 50
          fc = 'Neutral'
          if fg.get('data'):
              try:
                  fv = int(fg['data'][0]['value'])
                  fc = fg['data'][0].get('value_classification', 'Neutral')
              except:
                  pass
          
          print(f'BTC: ${int(bp)} ({bc:.2f}%)')
          print(f'ETH: ${int(ep)} ({ec:.2f}%)')
          print(f'恐慌贪婪: {fv}')
          
          score = 50
          if bc < -3: score += 15
          elif bc > 3: score -= 15
          if fv <= 25: score += 25
          elif fv >= 75: score -= 25
          
          if score >= 60: sig = '🟢 偏多'
          elif score <= 40: sig = '🔴 偏空'
          else: sig = '🟡 中性'
          
          nl = '\n'
          text = '## 加密货币市场多空信号提醒' + nl + nl
          text += f'⏰ {now} (北京时间)' + nl + nl
          text += '### 💰 实时行情' + nl + nl
          text += '| 币种 | 价格 | 24h涨跌 |' + nl
          text += '|:---:|:---:|:---:|' + nl
          text += f'| BTC | ${int(bp):,} | {bc:.2f}% |' + nl
          text += f'| ETH | ${int(ep):,} | {ec:.2f}% |' + nl
          text += f'| SOL | ${sp:.2f} | {sc:.2f}% |' + nl + nl
          text += '### 😨 市场情绪' + nl + nl
          text += f'恐慌贪婪指数: **{fv}** ({fc})' + nl + nl
          text += '### 🎯 综合分析' + nl + nl
          text += f'评分: {score}/100' + nl
          text += f'信号: {sig}' + nl + nl
          text += '---' + nl
          text += '🤖 GitHub Actions 自动推送'
          
          ok = send_msg('BTC市场信号', text)
          print(f'推送结果: {"成功" if ok else "失败"}')
          EOF

      - name: ETH Pro Signal
        run: |
          python3 << 'EOF'
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=20).read())
              except:
                  return None
          
          def send_msg(title, text):
              try:
                  msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
                  req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
                  resp = urllib.request.urlopen(req, timeout=10)
                  result = json.loads(resp.read())
                  print(f'钉钉响应: {result}')
                  return result.get('errcode') == 0
              except Exception as e:
                  print(f'发送失败: {e}')
                  return False
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          print(f'执行时间: {now}')
          
          k15 = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=100') or []
          k1h = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=1h&limit=100') or []
          k4h = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=4h&limit=100') or []
          k1d = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=1d&limit=100') or []
          ticker = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          fv = 50
          if fg.get('data'):
              try:
                  fv = int(fg['data'][0]['value'])
              except:
                  pass
          
          if k15:
              closes = [float(x[4]) for x in k15]
              price = closes[-1]
              change = float(ticker.get('priceChangePercent', 0))
              
              def ema(data, period):
                  if len(data) < period:
                      return sum(data) / len(data)
                  m = 2 / (period + 1)
                  e = sum(data[:period]) / period
                  for v in data[period:]:
                      e = v * m + e * (1 - m)
                  return e
              
              def rsi(data, period=14):
                  g, l = [], []
                  for i in range(1, len(data)):
                      d = data[i] - data[i-1]
                      g.append(max(0, d))
                      l.append(max(0, -d))
                  ag = sum(g[-period:]) / period
                  al = sum(l[-period:]) / period
                  return 100 - 100 / (1 + ag / al) if al > 0 else 100
              
              def atr(klines, period=14):
                  trs = []
                  for i in range(1, len(klines)):
                      h, l, pc = float(klines[i][2]), float(klines[i][3]), float(klines[i-1][4])
                      trs.append(max(h - l, abs(h - pc), abs(l - pc)))
                  return sum(trs[-period:]) / period
              
              def trend(klines):
                  if not klines or len(klines) < 21:
                      return 'neutral', 50
                  c = [float(x[4]) for x in klines]
                  e7, e21 = ema(c, 7), ema(c, 21)
                  r = rsi(c)
                  if c[-1] > e7 > e21 and r < 70:
                      return 'bullish', 70 + (70 - r) * 0.5
                  elif c[-1] < e7 < e21 and r > 30:
                      return 'bearish', 30 - (r - 30) * 0.5
                  return 'neutral', r
              
              t15, s15 = trend(k15)
              t1h, s1h = trend(k1h)
              t4h, s4h = trend(k4h)
              t1d, s1d = trend(k1d)
              
              bullish = [t15, t1h, t4h, t1d].count('bullish')
              bearish = [t15, t1h, t4h, t1d].count('bearish')
              
              score = 50
              if bullish >= 3: score += 20
              elif bearish >= 3: score -= 20
              
              rsi_val = rsi(closes)
              if rsi_val < 30: score += 15
              elif rsi_val > 70: score -= 15
              
              if fv <= 25: score += 10
              elif fv >= 75: score -= 10
              
              atr_val = atr(k15)
              
              if score >= 55: direction = '🟢 做多'
              elif score <= 45: direction = '🔴 做空'
              else: direction = '🟡 观望'
              
              winrate = min(80, 55 + abs(score - 50))
              
              if '多' in direction:
                  entry, sl = price, price - atr_val * 1.5
                  tp1, tp2, tp3 = price + atr_val, price + atr_val * 1.5, price + atr_val * 2
              elif '空' in direction:
                  entry, sl = price, price + atr_val * 1.5
                  tp1, tp2, tp3 = price - atr_val, price - atr_val * 1.5, price - atr_val * 2
              else:
                  entry, sl = price, price - atr_val * 1.5
                  tp1, tp2, tp3 = price + atr_val, price + atr_val * 1.5, price + atr_val * 2
              
              nl = '\n'
              text = '## 🚀 ETH Pro版短线信号' + nl + nl
              text += '加密货币市场多空信号提醒' + nl + nl
              text += f'### {direction} | 胜率 {int(winrate)}%' + nl + nl
              text += f'当前价: ${int(price):,} ({change:+.2f}%)' + nl + nl
              text += '### 🔄 多周期' + nl + nl
              text += '| 周期 | 方向 | 强度 |' + nl
              text += '|:---:|:---:|:---:|' + nl
              for t, s, n in [(t15, s15, '15m'), (t1h, s1h, '1h'), (t4h, s4h, '4h'), (t1d, s1d, '1d')]:
                  icon = '🟢' if t == 'bullish' else '🔴' if t == 'bearish' else '🟡'
                  text += f'| {n} | {icon} | {int(s)}% |' + nl
              text += f'| 共振 | {max(bullish, bearish)}/4 | - |' + nl + nl
              text += '### 📊 技术' + nl + nl
              text += f'RSI: {int(rsi_val)}' + nl + nl
              text += '### 🎯 止盈止损' + nl + nl
              text += f'入场: ${int(entry):,}' + nl
              text += f'止损: ${int(sl):,}' + nl
              text += f'TP1: ${int(tp1):,}' + nl
              text += f'TP2: ${int(tp2):,}' + nl
              text += f'TP3: ${int(tp3):,}' + nl + nl
              text += f'风险回报比: 1:{abs(tp2-entry)/abs(entry-sl):.2f}' + nl + nl
              text += f'⏰ {now}' + nl
              text += '---' + nl
              text += 'Pro版: 多周期·RSI·ATR'
              
              ok = send_msg('ETH Pro信号', text)
              print(f'推送结果: {"成功" if ok else "失败"}')
          EOF

