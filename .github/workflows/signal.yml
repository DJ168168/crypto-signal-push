name: Signal Push

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: BTC Signal
        run: |
          python3 << 'PYEOF'
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=20).read())
              except Exception as e:
                  print(f'Fetch error: {e}')
                  return None
          
          def send(title, text):
              try:
                  msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
                  req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
                  result = json.loads(urllib.request.urlopen(req, timeout=10).read())
                  return result.get('errcode') == 0
              except Exception as e:
                  print(f'Send error: {e}')
                  return False
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          
          btc = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          bp = int(float(btc.get('lastPrice', 0)))
          bc = round(float(btc.get('priceChangePercent', 0)), 2)
          ep = int(float(eth.get('lastPrice', 0)))
          ec = round(float(eth.get('priceChangePercent', 0)), 2)
          
          fv = 50
          fc = 'Neutral'
          if fg.get('data'):
              try:
                  fv = int(fg['data'][0]['value'])
                  fc = fg['data'][0].get('value_classification', 'Neutral')
              except:
                  pass
          
          score = 50 + (15 if bc < -3 else -10 if bc > 3 else 0) + (25 if fv <= 25 else -25 if fv >= 75 else 0)
          sig = '强多' if score >= 65 else '偏多' if score >= 55 else '强空' if score <= 35 else '偏空' if score <= 45 else '中性'
          
          nl = '\n'
          text = '## BTC信号 ' + sig + nl + nl
          text += '加密货币市场多空信号提醒' + nl + nl
          text += '时间: ' + now + nl + nl
          text += '### 价格' + nl
          text += 'BTC: $' + str(bp) + ' (' + str(bc) + '%)' + nl
          text += 'ETH: $' + str(ep) + ' (' + str(ec) + '%)' + nl + nl
          text += '### 情绪' + nl
          text += '恐慌贪婪: ' + str(fv) + ' (' + fc + ')' + nl + nl
          text += '### 评分: ' + str(score) + '/100' + nl
          text += '### 信号: ' + sig + nl
          
          print('推送:', '成功' if send('BTC信号 ' + sig, text) else '失败')
          PYEOF

      - name: ETH Signal
        run: |
          python3 << 'PYEOF'
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=20).read())
              except Exception as e:
                  print(f'Fetch error: {e}')
                  return None
          
          def send(title, text):
              try:
                  msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
                  req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
                  result = json.loads(urllib.request.urlopen(req, timeout=10).read())
                  return result.get('errcode') == 0
              except Exception as e:
                  print(f'Send error: {e}')
                  return False
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          
          k = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=100') or []
          t = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          
          if k:
              closes = [float(x[4]) for x in k]
              price = closes[-1]
              change = round(float(t.get('priceChangePercent', 0)), 2)
              
              # EMA
              def ema(d, p):
                  m = 2 / (p + 1)
                  e = sum(d[:p]) / p
                  for v in d[p:]: e = v * m + e * (1 - m)
                  return e
              
              e7, e21 = ema(closes, 7), ema(closes, 21)
              
              # RSI
              g, l = [], []
              for i in range(1, len(closes)):
                  c = closes[i] - closes[i-1]
                  g.append(max(0, c))
                  l.append(max(0, -c))
              ag, al = sum(g[-14:]) / 14, sum(l[-14:]) / 14
              rsi = 100 - 100 / (1 + ag / al) if al > 0 else 100
              
              score = 50
              if price > e7 > e21: score += 15
              elif price < e7 < e21: score -= 15
              if rsi < 30: score += 15
              elif rsi > 70: score -= 15
              
              sig = '做多' if score >= 60 else '做空' if score <= 40 else '观望'
              
              nl = '\n'
              text = '## ETH信号 ' + sig + nl + nl
              text += '加密货币市场多空信号提醒' + nl + nl
              text += '时间: ' + now + nl + nl
              text += '### ETH: $' + str(int(price)) + ' (' + str(change) + '%)' + nl + nl
              text += '### 技术指标' + nl
              text += 'EMA7: $' + str(int(e7)) + nl
              text += 'EMA21: $' + str(int(e21)) + nl
              text += 'RSI: ' + str(int(rsi)) + nl + nl
              text += '### 评分: ' + str(score) + '/100' + nl
              text += '### 信号: ' + sig + nl
              
              print('推送:', '成功' if send('ETH信号 ' + sig, text) else '失败')
          PYEOF

