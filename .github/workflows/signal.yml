name: Crypto Signal Push Pro

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: BTC Market Signal
        run: |
          python3 << 'PYEOF'
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url, timeout=25):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=timeout).read())
              except Exception as e:
                  print(f'Fetch error {url}: {e}')
                  return None
          
          def send_dingtalk(title, text):
              try:
                  msg = {
                      'msgtype': 'markdown',
                      'markdown': {
                          'title': title,
                          'text': text
                      }
                  }
                  req = urllib.request.Request(
                      WEBHOOK, 
                      data=json.dumps(msg).encode(), 
                      headers={'Content-Type': 'application/json'}
                  )
                  response = urllib.request.urlopen(req, timeout=15)
                  result = json.loads(response.read())
                  print(f'钉钉响应: {result}')
                  return result.get('errcode') == 0
              except Exception as e:
                  print(f'钉钉推送异常: {e}')
                  return False
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          print(f'开始执行: {now}')
          
          # 基础价格数据
          btc = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          sol = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=SOLUSDT') or {}
          
          bp = float(btc.get('lastPrice', 0))
          bc = float(btc.get('priceChangePercent', 0))
          ep = float(eth.get('lastPrice', 0))
          ec = float(eth.get('priceChangePercent', 0))
          sp = float(sol.get('lastPrice', 0))
          sc = float(sol.get('priceChangePercent', 0))
          
          print(f'BTC: ${int(bp)} ({bc:.2f}%)')
          print(f'ETH: ${int(ep)} ({ec:.2f}%)')
          
          # 恐慌贪婪
          fg = fetch('https://api.alternative.me/fng/') or {}
          fv = 50
          fc = 'Neutral'
          if fg.get('data'):
              try:
                  fv = int(fg['data'][0]['value'])
                  fc = fg['data'][0].get('value_classification', 'Neutral')
              except:
                  pass
          print(f'恐慌贪婪: {fv} ({fc})')
          
          # 多空比 - 使用公开API
          btc_lr = 1.0
          eth_lr = 1.0
          try:
              # CoinGlass API (公开)
              lr_data = fetch('https://open-api.coinglass.com/api/futures/longShortChart?symbol=BTC&exchange=all&type=1')
              if lr_data and lr_data.get('success'):
                  btc_lr = lr_data.get('data', {}).get('longShortRatio', 1.0)
          except:
              pass
          
          # 资金费率 - 使用公开API
          btc_fr = 0
          eth_fr = 0
          try:
              fr_data = fetch('https://open-api.coinglass.com/api/futures/fundingRate/v2?symbol=BTC')
              if fr_data and fr_data.get('success'):
                  for item in fr_data.get('data', []):
                      if item.get('exchange') == 'Binance':
                          btc_fr = float(item.get('rate', 0)) * 100
                          break
          except:
              pass
          
          # 综合评分
          score = 50
          signals = []
          
          if bc < -5:
              score += 20
              signals.append('📈 大跌反弹机会')
          elif bc < -3:
              score += 12
              signals.append('📉 下跌趋势')
          elif bc > 5:
              score -= 20
              signals.append('⚠️ 大涨回调风险')
          elif bc > 3:
              score -= 12
          
          if fv <= 20:
              score += 25
              signals.append('😨 极度恐慌=买入')
          elif fv <= 25:
              score += 20
              signals.append('😰 恐慌区间')
          elif fv >= 80:
              score -= 25
              signals.append('🤑 极度贪婪=卖出')
          elif fv >= 75:
              score -= 20
          
          if btc_lr > 1.3:
              score -= 10
              signals.append(f'⚠️ 散户做多拥挤')
          elif btc_lr < 0.8:
              score += 10
              signals.append(f'✅ 散户做空')
          
          if btc_fr < -0.03:
              score += 10
              signals.append('💰 负费率支撑')
          elif btc_fr > 0.03:
              score -= 10
              signals.append('💸 正费率压力')
          
          score = max(0, min(100, score))
          
          if score >= 65: sig = '🟢🟢 强烈做多'
          elif score >= 55: sig = '🟢 偏多'
          elif score <= 35: sig = '🔴🔴 强烈做空'
          elif score <= 45: sig = '🔴 偏空'
          else: sig = '🟡 中性观望'
          
          nl = '\n'
          text = '## 加密货币市场多空信号提醒' + nl + nl
          text += f'⏰ {now} (北京时间)' + nl + nl
          text += '### 💰 实时行情' + nl + nl
          text += '| 币种 | 价格 | 24h涨跌 |' + nl
          text += '|:---:|:---:|:---:|' + nl
          text += f'| BTC | ${int(bp):,} | {round(bc, 2)}% |' + nl
          text += f'| ETH | ${int(ep):,} | {round(ec, 2)}% |' + nl
          text += f'| SOL | ${sp:.2f} | {round(sc, 2)}% |' + nl + nl
          text += '### 😨 市场情绪' + nl + nl
          text += f'恐慌贪婪指数: **{fv}** ({fc})' + nl + nl
          text += '### 📊 衍生品数据' + nl + nl
          text += f'- 散户多空比: {round(btc_lr*50, 1)}% 多' + nl
          text += f'- 资金费率: {btc_fr:+.4f}%' + nl + nl
          text += '### 🎯 综合分析' + nl + nl
          text += f'**评分**: {score}/100' + nl
          text += f'**信号**: {sig}' + nl + nl
          
          if signals:
              text += '### 📝 关键信号' + nl + nl
              for s in signals[:5]:
                  text += f'- {s}' + nl
              text += nl
          
          text += '---' + nl
          text += '🤖 GitHub Actions 自动推送 | 每30分钟更新'
          
          print('准备推送消息...')
          print(f'消息长度: {len(text)} 字符')
          
          success = send_dingtalk('BTC市场信号', text)
          print(f'BTC推送: {"成功" if success else "失败"}')
          PYEOF

      - name: ETH Pro Signal
        run: |
          python3 << 'PYEOF'
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url, timeout=25):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=timeout).read())
              except:
                  return None
          
          def send_dingtalk(title, text):
              try:
                  msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
                  req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
                  result = json.loads(urllib.request.urlopen(req, timeout=15).read())
                  print(f'钉钉响应: {result}')
                  return result.get('errcode') == 0
              except Exception as e:
                  print(f'推送异常: {e}')
                  return False
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          print(f'开始ETH Pro分析: {now}')
          
          # K线数据
          k15 = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=100') or []
          k1h = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=1h&limit=100') or []
          k4h = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=4h&limit=100') or []
          k1d = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=1d&limit=100') or []
          
          ticker = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          
          # 恐慌贪婪
          fg = fetch('https://api.alternative.me/fng/') or {}
          fv = 50
          if fg.get('data'):
              try:
                  fv = int(fg['data'][0]['value'])
              except:
                  pass
          
          if k15:
              closes = [float(x[4]) for x in k15]
              volumes = [float(x[5]) for x in k15]
              price = closes[-1]
              change = round(float(ticker.get('priceChangePercent', 0)), 2)
              
              def ema(data, period):
                  if len(data) < period:
                      return sum(data) / len(data)
                  m = 2 / (period + 1)
                  e = sum(data[:period]) / period
                  for v in data[period:]:
                      e = v * m + e * (1 - m)
                  return e
              
              def rsi(data, period=14):
                  g, l = [], []
                  for i in range(1, len(data)):
                      d = data[i] - data[i-1]
                      g.append(max(0, d))
                      l.append(max(0, -d))
                  ag = sum(g[-period:]) / period
                  al = sum(l[-period:]) / period
                  return 100 - 100 / (1 + ag / al) if al > 0 else 100
              
              def atr(klines, period=14):
                  trs = []
                  for i in range(1, len(klines)):
                      h, l, pc = float(klines[i][2]), float(klines[i][3]), float(klines[i-1][4])
                      trs.append(max(h - l, abs(h - pc), abs(l - pc)))
                  return sum(trs[-period:]) / period
              
              def get_trend(klines):
                  if not klines or len(klines) < 21:
                      return 'neutral', 50
                  c = [float(x[4]) for x in klines]
                  e7, e21 = ema(c, 7), ema(c, 21)
                  r = rsi(c)
                  if c[-1] > e7 > e21 and r < 70:
                      return 'bullish', 70 + (70 - r) * 0.5
                  elif c[-1] < e7 < e21 and r > 30:
                      return 'bearish', 30 - (r - 30) * 0.5
                  return 'neutral', r
              
              t15, s15 = get_trend(k15)
              t1h, s1h = get_trend(k1h)
              t4h, s4h = get_trend(k4h)
              t1d, s1d = get_trend(k1d)
              
              trends = [t15, t1h, t4h, t1d]
              bullish_count = trends.count('bullish')
              bearish_count = trends.count('bearish')
              
              rsi_val = rsi(closes)
              atr_val = atr(k15)
              
              # 成交量
              avg_vol = sum(volumes[-20:]) / 20
              vol_ratio = volumes[-1] / avg_vol if avg_vol > 0 else 1
              
              # 评分
              score = 50
              reasons = []
              
              if bullish_count >= 3:
                  score += 20
                  reasons.append('📈 多周期多头共振')
              elif bearish_count >= 3:
                  score -= 20
                  reasons.append('📉 多周期空头共振')
              
              if rsi_val < 30:
                  score += 15
                  reasons.append(f'📊 RSI超卖({int(rsi_val)})')
              elif rsi_val > 70:
                  score -= 15
                  reasons.append(f'📊 RSI超买({int(rsi_val)})')
              
              if fv <= 25:
                  score += 10
              elif fv >= 75:
                  score -= 10
              
              score = max(0, min(100, score))
              
              if score >= 60: direction = '🟢 做多'
              elif score <= 40: direction = '🔴 做空'
              else: direction = '🟡 观望'
              
              winrate = min(85, 55 + abs(score - 50) * 0.5)
              resonance = f'{max(bullish_count, bearish_count)}/4'
              
              # 止盈止损
              if '多' in direction:
                  entry = price
                  stop_loss = price - atr_val * 1.5
                  tp1 = price + atr_val
                  tp2 = price + atr_val * 1.5
                  tp3 = price + atr_val * 2
              elif '空' in direction:
                  entry = price
                  stop_loss = price + atr_val * 1.5
                  tp1 = price - atr_val
                  tp2 = price - atr_val * 1.5
                  tp3 = price - atr_val * 2
              else:
                  entry = price
                  stop_loss = price - atr_val * 1.5
                  tp1 = price + atr_val
                  tp2 = price + atr_val * 1.5
                  tp3 = price + atr_val * 2
              
              rr = abs(tp2 - entry) / abs(entry - stop_loss) if abs(entry - stop_loss) > 0 else 1
              
              nl = '\n'
              text = '## 🚀 ETH Pro版短线信号' + nl + nl
              text += '加密货币市场多空信号提醒' + nl + nl
              text += f'### {direction} | 胜率 {int(winrate)}%' + nl + nl
              text += f'**当前价**: ${int(price):,} ({change:+.2f}%)' + nl + nl
              
              text += '### 🔄 多周期框架' + nl + nl
              text += '| 周期 | 方向 | 强度 |' + nl
              text += '|:---:|:---:|:---:|' + nl
              for t, s, n in [(t15, s15, '15m'), (t1h, s1h, '1h'), (t4h, s4h, '4h'), (t1d, s1d, '1d')]:
                  icon = '🟢' if t == 'bullish' else '🔴' if t == 'bearish' else '🟡'
                  text += f'| {n} | {icon} | {int(s)}% |' + nl
              text += f'| **共振** | {resonance} | - |' + nl + nl
              
              text += '### 📊 技术指标' + nl + nl
              text += f'- RSI: {int(rsi_val)}' + nl
              text += f'- 成交量: {vol_ratio:.1f}x' + nl + nl
              
              text += '### 🎯 止盈止损' + nl + nl
              text += '| 类型 | 价格 | 变化 |' + nl
              text += '|:---:|:---:|:---:|' + nl
              text += f'| 入场 | ${int(entry):,} | - |' + nl
              text += f'| 止损 | ${int(stop_loss):,} | {((stop_loss-entry)/entry*100):.2f}% |' + nl
              text += f'| TP1 | ${int(tp1):,} | {((tp1-entry)/entry*100):.2f}% |' + nl
              text += f'| TP2 | ${int(tp2):,} | {((tp2-entry)/entry*100):.2f}% |' + nl
              text += f'| TP3 | ${int(tp3):,} | {((tp3-entry)/entry*100):.2f}% |' + nl + nl
              text += f'**风险回报比**: 1:{rr:.2f}' + nl + nl
              
              if reasons:
                  text += '### 📝 信号理由' + nl + nl
                  for r in reasons:
                      text += f'- {r}' + nl
                  text += nl
              
              text += f'⏰ {now}' + nl
              text += '---' + nl
              text += 'Pro版: 多周期共振·RSI·成交量·止盈止损'
              
              print(f'消息长度: {len(text)} 字符')
              success = send_dingtalk('ETH Pro信号', text)
              print(f'ETH Pro推送: {"成功" if success else "失败"}')
          PYEOF

