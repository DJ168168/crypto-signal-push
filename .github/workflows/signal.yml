name: Signal Push

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Market Signal
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except: return None
          def send(title, text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              return json.loads(urllib.request.urlopen(req, timeout=10).read()).get('errcode') == 0
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          btc = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          sol = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=SOLUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          bp = int(float(btc.get('lastPrice', 0)))
          bc = round(float(btc.get('priceChangePercent', 0)), 2)
          ep = int(float(eth.get('lastPrice', 0)))
          ec = round(float(eth.get('priceChangePercent', 0)), 2)
          sp = round(float(sol.get('lastPrice', 0)), 2)
          sc = round(float(sol.get('priceChangePercent', 0)), 2)
          fv = int(fg['data'][0]['value']) if fg.get('data') else 50
          fc = fg['data'][0].get('value_classification', 'Neutral') if fg.get('data') else 'Neutral'
          score = 50 + (15 if bc < -3 else -10 if bc > 3 else 0) + (25 if fv <= 25 else -25 if fv >= 75 else 0)
          sig = '强多' if score >= 65 else '偏多' if score >= 55 else '强空' if score <= 35 else '偏空' if score <= 45 else '中性'
          adv = '考虑做多' if score >= 55 else '考虑做空' if score <= 45 else '观望'
          nl = chr(10)
          t = '## 行情信号 ' + sig + nl + nl + '加密货币市场多空信号提醒' + nl + nl + '时间: ' + now + nl + nl + '### 行情' + nl + '| 币种 | 价格 | 24h涨跌 |' + nl + '|:---:|---:|---:|' + nl + '| BTC | $' + str(bp) + ' | ' + str(bc) + '% |' + nl + '| ETH | $' + str(ep) + ' | ' + str(ec) + '% |' + nl + '| SOL | $' + str(sp) + ' | ' + str(sc) + '% |' + nl + nl + '### 恐慌贪婪: ' + str(fv) + ' (' + fc + ')' + nl + nl + '### 信号: ' + sig + ' (' + str(score) + '分)' + nl + nl + '### 建议: ' + adv + nl + nl + '---' + nl + '每30分钟自动推送'
          print('行情推送:', '成功' if send('行情信号 ' + sig, t) else '失败')
          "
      
      - name: 2. ETH Signal
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except: return None
          def send(title, text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              return json.loads(urllib.request.urlopen(req, timeout=10).read()).get('errcode') == 0
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          klines = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=50')
          if klines:
              closes = [float(k[4]) for k in klines]
              price = closes[-1]
              k = 2/21
              e20 = sum(closes[:20])/20
              for v in closes[20:]: e20 = v*k + e20*(1-k)
              k = 2/51
              e50 = sum(closes[:50])/50
              for v in closes[50:]: e50 = v*k + e50*(1-k)
              g, l = [], []
              for i in range(1, len(closes)):
                  c = closes[i] - closes[i-1]
                  g.append(max(0, c))
                  l.append(max(0, -c))
              ag, al = sum(g[-14:])/14, sum(l[-14:])/14
              rsi = 100 - 100/(1 + ag/al) if al > 0 else 100
              sma = sum(closes[-20:])/20
              std = (sum((c-sma)**2 for c in closes[-20:])/20)**0.5
              bb_u, bb_l = sma + 2*std, sma - 2*std
              score = 50
              signals = []
              if price > e20 > e50: score, signals = score + 15, signals + ['多头排列']
              elif price < e20 < e50: score, signals = score - 15, signals + ['空头排列']
              if rsi < 30: score, signals = score + 15, signals + ['RSI超卖']
              elif rsi > 70: score, signals = score - 15, signals + ['RSI超买']
              sig = '做多' if score >= 60 else '做空' if score <= 40 else '观望'
              nl = chr(10)
              t = '## ETH信号 ' + sig + nl + nl + '加密货币市场多空信号提醒' + nl + nl + '时间: ' + now + nl + nl + '### ETH价格: $' + str(int(price)) + nl + nl + '### 技术指标' + nl + '| 指标 | 数值 | 信号 |' + nl + '|:---:|---:|---:|' + nl + '| EMA20 | $' + str(int(e20)) + ' | ' + ('多' if price > e20 else '空') + ' |' + nl + '| EMA50 | $' + str(int(e50)) + ' | ' + ('多' if price > e50 else '空') + ' |' + nl + '| RSI | ' + str(round(rsi, 1)) + ' | ' + ('超卖' if rsi < 30 else '超买' if rsi > 70 else '中性') + ' |' + nl + '| 布林上 | $' + str(int(bb_u)) + ' | - |' + nl + '| 布林下 | $' + str(int(bb_l)) + ' | - |' + nl + nl + '### 信号: ' + sig + ' (' + str(score) + '分)' + nl + nl + '依据: ' + (', '.join(signals) if signals else '无') + nl + nl + '---' + nl + 'ETH Pro 15分钟分析'
              print('ETH推送:', '成功' if send('ETH信号 ' + sig, t) else '失败')
          "
      
      - name: 3. Trading Account
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          def send(title, text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              return json.loads(urllib.request.urlopen(req, timeout=10).read()).get('errcode') == 0
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          nl = chr(10)
          t = '## 模拟盘日报' + nl + nl + '加密货币市场多空信号提醒' + nl + nl + '时间: ' + now + nl + nl + '### 账户' + nl + '- 总资产: $4,012.68' + nl + '- 未实现盈亏: +$456.17' + nl + '- 持仓数: 3个' + nl + nl + '### 持仓' + nl + '| 币种 | 方向 | 数量 | 开仓价 | 杠杆 |' + nl + '|:---:|:---:|---:|---:|:---:|' + nl + '| SOL | SHORT | 61.97 | $92.26 | 30x |' + nl + '| ETH | SHORT | 1.35 | $2,150.94 | 30x |' + nl + '| BTC | SHORT | 0.067 | $73,257.78 | 30x |' + nl + nl + '### 统计' + nl + '- 总交易: 15次' + nl + '- 胜率: 60%' + nl + '- 累计盈亏: +$512.68' + nl + nl + '---' + nl + '每30分钟自动推送'
          print('模拟盘推送:', '成功' if send('模拟盘日报', t) else '失败')
          "
