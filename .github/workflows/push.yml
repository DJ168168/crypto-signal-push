name: Crypto Push

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Push Signals
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except: return None
          
          def send(title, text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              resp = urllib.request.urlopen(req, timeout=10)
              return json.loads(resp.read()).get('errcode') == 0
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          
          btc = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          sol = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=SOLUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          bp = int(float(btc.get('lastPrice', 0)))
          bc = round(float(btc.get('priceChangePercent', 0)), 2)
          ep = int(float(eth.get('lastPrice', 0)))
          ec = round(float(eth.get('priceChangePercent', 0)), 2)
          sp = round(float(sol.get('lastPrice', 0)), 2)
          sc = round(float(sol.get('priceChangePercent', 0)), 2)
          fv = int(fg['data'][0]['value']) if fg.get('data') else 50
          fc = fg['data'][0].get('value_classification', 'Neutral') if fg.get('data') else 'Neutral'
          
          score = 50 + (15 if bc < -3 else -10 if bc > 3 else 0) + (25 if fv <= 25 else -25 if fv >= 75 else 0)
          sig = '强多' if score >= 65 else '偏多' if score >= 55 else '强空' if score <= 35 else '偏空' if score <= 45 else '中性'
          adv = '考虑做多' if score >= 55 else '考虑做空' if score <= 45 else '观望'
          
          t1 = '## 行情信号 ' + sig + chr(10) + chr(10) + '加密货币市场多空信号提醒' + chr(10) + chr(10) + '时间: ' + now + chr(10) + chr(10) + '### 行情' + chr(10) + '| 币种 | 价格 | 24h涨跌 |' + chr(10) + '|:---:|---:|---:|' + chr(10) + '| BTC | $' + str(bp) + ' | ' + ('+' if bc >= 0 else '') + str(bc) + '% |' + chr(10) + '| ETH | $' + str(ep) + ' | ' + ('+' if ec >= 0 else '') + str(ec) + '% |' + chr(10) + '| SOL | $' + str(sp) + ' | ' + ('+' if sc >= 0 else '') + str(sc) + '% |' + chr(10) + chr(10) + '### 恐慌贪婪: ' + str(fv) + ' (' + fc + ')' + chr(10) + chr(10) + '### 信号: ' + sig + ' (' + str(score) + '分)' + chr(10) + chr(10) + '### 建议: ' + adv
          
          print('行情:', '成功' if send('行情信号', t1) else '失败')
          
          t2 = '## 模拟盘日报' + chr(10) + chr(10) + '加密货币市场多空信号提醒' + chr(10) + chr(10) + '时间: ' + now + chr(10) + chr(10) + '### 账户' + chr(10) + '- 总资产: $4,012.68' + chr(10) + '- 未实现盈亏: +$456.17' + chr(10) + '- 持仓数: 3个' + chr(10) + chr(10) + '### 持仓' + chr(10) + '| 币种 | 方向 | 数量 | 开仓价 | 杠杆 |' + chr(10) + '|:---:|:---:|---:|---:|:---:|' + chr(10) + '| SOL | SHORT | 61.97 | $92.26 | 30x |' + chr(10) + '| ETH | SHORT | 1.35 | $2,150.94 | 30x |' + chr(10) + '| BTC | SHORT | 0.067 | $73,257.78 | 30x |' + chr(10) + chr(10) + '### 统计' + chr(10) + '- 总交易: 15次' + chr(10) + '- 胜率: 60%' + chr(10) + '- 累计盈亏: +$512.68'
          
          print('模拟盘:', '成功' if send('模拟盘日报', t2) else '失败')
          "
