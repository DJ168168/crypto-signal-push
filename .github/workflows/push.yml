name: Crypto Push

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Market Signal
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except: return None
          
          def send(text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': '行情信号', 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              return json.loads(urllib.request.urlopen(req, timeout=10).read()).get('errcode') == 0
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          btc = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          sol = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=SOLUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          bp = float(btc.get('lastPrice', 0))
          bc = float(btc.get('priceChangePercent', 0))
          ep = float(eth.get('lastPrice', 0))
          ec = float(eth.get('priceChangePercent', 0))
          sp = float(sol.get('lastPrice', 0))
          sc = float(sol.get('priceChangePercent', 0))
          fv = int(fg['data'][0]['value']) if fg.get('data') else 50
          fc = fg['data'][0].get('value_classification', 'Neutral') if fg.get('data') else 'Neutral'
          
          score = 50 + (15 if bc < -3 else -10 if bc > 3 else 0) + (25 if fv <= 25 else -25 if fv >= 75 else 0)
          sig = '强多' if score >= 65 else '偏多' if score >= 55 else '强空' if score <= 35 else '偏空' if score <= 45 else '中性'
          
          text = f'''## 行情信号 {sig}

加密货币市场多空信号提醒

时间: {now}

### 行情
| 币种 | 价格 | 24h涨跌 |
|:---:|---:|---:|
| BTC | \${bp:,.0f} | {bc:+.2f}% |
| ETH | \${ep:,.0f} | {ec:+.2f}% |
| SOL | \${sp:,.2f} | {sc:+.2f}% |

### 恐慌贪婪: {fv} ({fc})

### 信号: {sig} ({score}分)

### 建议: {'考虑做多' if score >= 55 else '考虑做空' if score <= 45 else '观望'}'''
          
          print('✅ 行情推送成功' if send(text) else '❌ 失败')
          "
      
      - name: ETH Signal
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except: return None
          
          def send(text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': 'ETH信号', 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              return json.loads(urllib.request.urlopen(req, timeout=10).read()).get('errcode') == 0
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          klines = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=50')
          
          if klines:
              closes = [float(k[4]) for k in klines]
              price = closes[-1]
              
              # EMA
              k = 2/21
              e20 = sum(closes[:20])/20
              for v in closes[20:]: e20 = v*k + e20*(1-k)
              
              k = 2/51
              e50 = sum(closes[:50])/50
              for v in closes[50:]: e50 = v*k + e50*(1-k)
              
              # RSI
              g, l = [], []
              for i in range(1, len(closes)):
                  c = closes[i] - closes[i-1]
                  g.append(max(0, c))
                  l.append(max(0, -c))
              ag, al = sum(g[-14:])/14, sum(l[-14:])/14
              rsi = 100 - 100/(1 + ag/al) if al > 0 else 100
              
              # Bollinger
              sma = sum(closes[-20:])/20
              std = (sum((c-sma)**2 for c in closes[-20:])/20)**0.5
              bb_u, bb_l = sma + 2*std, sma - 2*std
              
              score = 50
              if price > e20 > e50: score += 15
              elif price < e20 < e50: score -= 15
              if rsi < 30: score += 15
              elif rsi > 70: score -= 15
              
              sig = '做多' if score >= 60 else '做空' if score <= 40 else '观望'
              
              text = f'''## ETH信号 {sig}

加密货币市场多空信号提醒

时间: {now}

### ETH价格: \${price:,.2f}

### 技术指标
| 指标 | 数值 | 信号 |
|:---:|---:|:---:|
| EMA20 | \${e20:,.2f} | {'多' if price > e20 else '空'} |
| EMA50 | \${e50:,.2f} | {'多' if price > e50 else '空'} |
| RSI | {rsi:.1f} | {'超卖' if rsi < 30 else '超买' if rsi > 70 else '中性'} |
| 布林上 | \${bb_u:,.2f} | - |
| 布林下 | \${bb_l:,.2f} | - |

### 信号: {sig} ({score}分)'''
              
              print('✅ ETH推送成功' if send(text) else '❌ 失败')
          "
      
      - name: Trading Account
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def send(text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': '模拟盘日报', 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              return json.loads(urllib.request.urlopen(req, timeout=10).read()).get('errcode') == 0
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          
          text = '''## 模拟盘日报

加密货币市场多空信号提醒

时间: ''' + now + '''

### 账户
- 总资产: \$4,012.68
- 未实现盈亏: +\$456.17
- 持仓数: 3个

### 持仓
| 币种 | 方向 | 数量 | 开仓价 | 杠杆 |
|:---:|:---:|---:|---:|:---:|
| SOL | SHORT | 61.97 | \$92.26 | 30x |
| ETH | SHORT | 1.35 | \$2,150.94 | 30x |
| BTC | SHORT | 0.067 | \$73,257.78 | 30x |

### 统计
- 总交易: 15次
- 胜率: 60%
- 累计盈亏: +\$512.68'''
          
          print('✅ 模拟盘推送成功' if send(text) else '❌ 失败')
          "
