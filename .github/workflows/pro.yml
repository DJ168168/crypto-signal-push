name: Pro Signal Push

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: BTC Signal
        run: |
          python3 << 'PYEND'
          import urllib.request, json, math
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=20).read())
              except: return None
          
          def ema(data, p):
              if len(data) < p: return data[-1]
              k = 2 / (p + 1)
              e = sum(data[:p]) / p
              for v in data[p:]: e = v * k + e * (1 - k)
              return e
          
          def rsi(data, p=14):
              if len(data) < p + 1: return 50
              g, l = [], []
              for i in range(1, len(data)):
                  c = data[i] - data[i-1]
                  g.append(max(0, c))
                  l.append(max(0, -c))
              ag, al = sum(g[-p:]) / p, sum(l[-p:]) / p
              return 100 - 100 / (1 + ag / al) if al > 0 else 100
          
          def atr(kl, p=14):
              trs = []
              for i in range(1, len(kl)):
                  h, l, pc = float(kl[i][2]), float(kl[i][3]), float(kl[i-1][4])
                  trs.append(max(h-l, abs(h-pc), abs(l-pc)))
              return sum(trs[-p:]) / p
          
          def send(title, text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              return json.loads(urllib.request.urlopen(req, timeout=10).read().get('errcode') == 0
          
          now = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S')
          
          k1h = fetch('https://data-api.binance.vision/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=100') or []
          k4h = fetch('https://data-api.binance.vision/api/v3/klines?symbol=BTCUSDT&interval=4h&limit=50') or []
          ticker = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          if not k1h:
              print('No data')
              exit(0)
          
          closes = [float(k[4]) for k in k1h]
          price = closes[-1]
          atr_v = atr(k1h)
          change = float(ticker.get('priceChangePercent', 0))
          
          score = 50
          sigs = []
          warns = []
          
          e7, e21, e50 = ema(closes, 7), ema(closes, 21), ema(closes, 50)
          if e7 > e21 > e50:
              score += 15
              sigs.append('多头排列')
          elif e7 < e21 < e50:
              score -= 15
              sigs.append('空头排列')
          
          if k4h:
              c4 = [float(k[4]) for k in k4h]
              if price > ema(c4, 21):
                  score += 5
                  sigs.append('4H向上')
          
          r = rsi(closes)
          if r < 25:
              score += 15
              sigs.append('RSI超卖' + str(int(r)))
          elif r < 35:
              score += 10
              sigs.append('RSI偏低' + str(int(r)))
          elif r > 75:
              score -= 15
              warns.append('RSI超买' + str(int(r)))
          elif r > 65:
              score -= 10
              warns.append('RSI偏高' + str(int(r)))
          
          macd = ema(closes, 12) - ema(closes, 26)
          if macd > 0:
              score += 10
              sigs.append('MACD金叉')
          else:
              score -= 5
          
          sma = sum(closes[-20:]) / 20
          std = math.sqrt(sum((c - sma)**2 for c in closes[-20:]) / 20)
          bb_u, bb_l = sma + 2*std, sma - 2*std
          bb_pos = (price - bb_l) / (bb_u - bb_l)
          
          if bb_pos < 0.2:
              score += 10
              sigs.append('布林下轨')
          elif bb_pos > 0.8:
              score -= 10
              warns.append('布林上轨')
          
          fg_v = int(fg['data'][0]['value']) if fg.get('data') else 50
          fg_c = fg['data'][0].get('value_classification', 'Neutral') if fg.get('data') else 'Neutral'
          
          if fg_v <= 15:
              score += 15
              sigs.append('极度恐慌' + str(fg_v))
          elif fg_v <= 25:
              score += 12
              sigs.append('恐慌' + str(fg_v))
          elif fg_v >= 85:
              score -= 15
              warns.append('极度贪婪' + str(fg_v))
          elif fg_v >= 75:
              score -= 12
              warns.append('贪婪' + str(fg_v))
          
          if change < -5:
              score += 10
              sigs.append('暴跌' + str(round(change, 1)) + '%')
          elif change > 5:
              score -= 10
              warns.append('暴涨' + str(round(change, 1)) + '%')
          
          score = max(0, min(100, score))
          
          if score >= 75:
              sig, act, lev = '强多', '做多', 5
          elif score >= 60:
              sig, act, lev = '偏多', '做多', 3
          elif score <= 25:
              sig, act, lev = '强空', '做空', 5
          elif score <= 40:
              sig, act, lev = '偏空', '做空', 3
          else:
              sig, act, lev = '中性', '观望', 1
          
          if act == '做多':
              sl, tp1, tp2 = price - 2*atr_v, price + 1.5*atr_v, price + 3*atr_v
          elif act == '做空':
              sl, tp1, tp2 = price + 2*atr_v, price - 1.5*atr_v, price - 3*atr_v
          else:
              sl, tp1, tp2 = price - 2*atr_v, price + 1.5*atr_v, price + 3*atr_v
          
          win_rate = min(85, max(35, 50 + (score - 50) * 0.7))
          
          nl = chr(10)
          sig_text = nl.join(['- ' + s for s in sigs]) if sigs else '- 暂无'
          warn_text = nl.join(['- ' + w for w in warns]) if warns else '- 无'
          
          text = '## BTC Pro信号 ' + sig + nl + nl
          text += '加密货币市场多空信号提醒' + nl + nl
          text += '时间 ' + now + nl + nl
          text += '### 价格' + nl
          text += '**$' + str(int(price)) + '** (' + str(round(change, 2)) + '%)' + nl + nl
          text += '### 评分' + nl
          text += '**' + str(score) + '/100** | 胜率 ' + str(int(win_rate)) + '%' + nl + nl
          text += '### 技术指标' + nl
          text += '| 指标 | 数值 | 信号 |' + nl
          text += '|---|---|---|' + nl
          text += '| EMA7 | $' + str(int(e7)) + ' | ' + ('多' if price > e7 else '空') + ' |' + nl
          text += '| EMA21 | $' + str(int(e21)) + ' | ' + ('多' if price > e21 else '空') + ' |' + nl
          text += '| RSI | ' + str(int(r)) + ' | ' + ('超卖' if r < 35 else '超买' if r > 65 else '中性') + ' |' + nl
          text += '| MACD | ' + ('+' if macd > 0 else '-') + ' | ' + ('金叉' if macd > 0 else '死叉') + ' |' + nl + nl
          text += '### 情绪' + nl
          text += '恐慌贪婪 **' + str(fg_v) + '** (' + fg_c + ')' + nl + nl
          text += '### 信号依据' + nl + sig_text + nl + nl
          text += '### 风险提示' + nl + warn_text + nl + nl
          text += '### 交易计划' + nl
          text += '| 项目 | 价格 |' + nl
          text += '|---|---|' + nl
          text += '| 入场 | $' + str(int(price)) + ' |' + nl
          text += '| 止损 | $' + str(int(sl)) + ' |' + nl
          text += '| 止盈1 | $' + str(int(tp1)) + ' |' + nl
          text += '| 止盈2 | $' + str(int(tp2)) + ' |' + nl
          text += '| 杠杆 | ' + str(lev) + 'x |' + nl + nl
          text += '### 建议' + nl + '> ' + act + ('，严格止损' if act != '观望' else '') + nl + nl
          text += '---' + nl + 'BTC Pro 高胜率信号'
          
          print('BTC', '成功' if send('BTC Pro ' + sig, text) else '失败')
          PYEND

