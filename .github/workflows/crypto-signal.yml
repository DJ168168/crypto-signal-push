name: Crypto Signal Push

on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'
  workflow_dispatch:

jobs:
  push-signals:
    runs-on: ubuntu-latest
    
    steps:
      - name: 行情信号
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=70dc360efe8ce9280f526840b12634296ab6a920f280f6582e4df5d5f49d4643'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except: return None
          
          def send(title, text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              urllib.request.urlopen(req, timeout=10)
          
          now = datetime.now(timezone(timedelta(hours=8)))
          btc = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          bp = float(btc.get('lastPrice', 0))
          bc = float(btc.get('priceChangePercent', 0))
          ep = float(eth.get('lastPrice', 0))
          ec = float(eth.get('priceChangePercent', 0))
          fv = int(fg.get('data', [{}])[0].get('value', 50)) if fg.get('data') else 50
          
          score = 50 + (15 if bc < -3 else -10 if bc > 3 else 0) + (25 if fv <= 25 else -25 if fv >= 75 else 0)
          sig = '看多' if score >= 55 else '看空' if score <= 45 else '中性'
          
          text = '## 行情信号 ' + sig + chr(10) + chr(10) + '加密货币市场多空信号提醒' + chr(10) + chr(10) + '时间: ' + now.strftime('%Y/%m/%d %H:%M:%S') + chr(10) + chr(10) + '### 行情' + chr(10) + '| 币种 | 价格 | 24h涨跌 |' + chr(10) + '|:---:|---:|---:|' + chr(10) + '| BTC | \$' + str(int(bp)) + ' | ' + ('+' if bc >= 0 else '') + str(round(bc, 2)) + '% |' + chr(10) + '| ETH | \$' + str(int(ep)) + ' | ' + ('+' if ec >= 0 else '') + str(round(ec, 2)) + '% |' + chr(10) + chr(10) + '### 恐慌贪婪: ' + str(fv) + chr(10) + chr(10) + '### 信号: ' + sig + ' (' + str(score) + '分)' + chr(10) + chr(10) + '---' + chr(10) + '每10分钟自动更新'
          
          send('行情信号', text)
          print('行情推送成功')
          "

      - name: ETH信号
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=70dc360efe8ce9280f526840b12634296ab6a920f280f6582e4df5d5f49d4643'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except: return None
          
          def send(title, text):
              msg = {'msgtype': 'markdown', 'markdown': {'title': title, 'text': text}}
              req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
              urllib.request.urlopen(req, timeout=10)
          
          now = datetime.now(timezone(timedelta(hours=8)))
          klines = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=50')
          
          if klines:
              closes = [float(k[4]) for k in klines]
              price = closes[-1]
              
              def ema(data, period):
                  k = 2 / (period + 1)
                  val = sum(data[:period]) / period
                  for p in data[period:]:
                      val = p * k + val * (1 - k)
                  return val
              
              e20 = ema(closes, 20)
              e50 = ema(closes, 50)
              
              score = 50 + (15 if price > e20 > e50 else -15 if price < e20 < e50 else 0)
              sig = '做多' if score >= 55 else '做空' if score <= 45 else '观望'
              
              text = '## ETH信号 ' + sig + chr(10) + chr(10) + '加密货币市场多空信号提醒' + chr(10) + chr(10) + '时间: ' + now.strftime('%Y/%m/%d %H:%M:%S') + chr(10) + chr(10) + '### ETH价格: \$' + str(round(price, 2)) + chr(10) + chr(10) + '| 指标 | 数值 | 信号 |' + chr(10) + '|:---:|---:|:---:|' + chr(10) + '| EMA20 | \$' + str(round(e20, 2)) + ' | ' + ('多' if price > e20 else '空') + ' |' + chr(10) + '| EMA50 | \$' + str(round(e50, 2)) + ' | ' + ('多' if price > e50 else '空') + ' |' + chr(10) + chr(10) + '### 信号: ' + sig + ' (' + str(score) + '分)' + chr(10) + chr(10) + '---' + chr(10) + 'ETH 15分钟分析'
              
              send('ETH信号', text)
              print('ETH推送成功')
          "
