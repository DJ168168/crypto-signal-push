name: Push
on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -X POST "${{ secrets.DINGTALK_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{"msgtype":"text","text":{"content":"🔔 加密货币市场多空信号提醒\n\n测试成功！"}}'
