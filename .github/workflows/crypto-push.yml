name: Crypto Triple Push

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push-market:
    runs-on: ubuntu-latest
    steps:
      - name: 行情信号推送
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except: return None
          
          now = datetime.now(timezone(timedelta(hours=8)))
          btc = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          sol = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=SOLUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          bp = float(btc.get('lastPrice', 0))
          bc = float(btc.get('priceChangePercent', 0))
          ep = float(eth.get('lastPrice', 0))
          ec = float(eth.get('priceChangePercent', 0))
          sp = float(sol.get('lastPrice', 0))
          sc = float(sol.get('priceChangePercent', 0))
          fv = int(fg.get('data', [{}])[0].get('value', 50)) if fg.get('data') else 50
          fc = fg.get('data', [{}])[0].get('value_classification', 'Neutral') if fg.get('data') else 'Neutral'
          
          score = 50
          if bc < -3: score += 15
          elif bc > 3: score -= 10
          if fv <= 25: score += 25
          elif fv >= 75: score -= 25
          score = max(0, min(100, score))
          
          sig = '强多' if score >= 65 else '偏多' if score >= 55 else '强空' if score <= 35 else '偏空' if score <= 45 else '中性'
          adv = '考虑做多' if score >= 55 else '考虑做空' if score <= 45 else '观望'
          fe = '😱' if fv <= 20 else '😨' if fv <= 40 else '😐' if fv <= 60 else '😊'
          
          msg = {'msgtype': 'markdown', 'markdown': {'title': f'行情信号 {sig}', 'text': f'''## 行情信号 {sig}

加密货币市场多空信号提醒

时间: {now.strftime(\"%Y-%m-%d %H:%M:%S\")}

### 行情
| 币种 | 价格 | 24h |
|:---:|---:|---:|
| BTC | \${bp:,.0f} | {bc:+.2f}% |
| ETH | \${ep:,.0f} | {ec:+.2f}% |
| SOL | \${sp:,.2f} | {sc:+.2f}% |

### {fe} 恐慌贪婪
{fv} ({fc})

### 信号
评分: {score}/100
方向: {sig}

### 建议
{adv}

---
每30分钟自动推送'''}}
          
          req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
          r = json.loads(urllib.request.urlopen(req).read())
          print('行情推送:', '成功' if r.get('errcode')==0 else f'失败{r}')
          "

  push-eth:
    runs-on: ubuntu-latest
    steps:
      - name: ETH信号推送
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except: return None
          
          now = datetime.now(timezone(timedelta(hours=8)))
          klines = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=50')
          
          if not klines:
              print('无数据')
              exit(0)
          
          closes = [float(k[4]) for k in klines]
          price = closes[-1]
          
          def ema(d, p):
              k = 2/(p+1)
              e = sum(d[:p])/p
              for x in d[p:]: e = x*k + e*(1-k)
              return e
          e20, e50 = ema(closes, 20), ema(closes, 50)
          
          g, l = [], []
          for i in range(1, len(closes)):
              c = closes[i] - closes[i-1]
              g.append(c if c > 0 else 0)
              l.append(-c if c < 0 else 0)
          ag, al = sum(g[-14:])/14, sum(l[-14:])/14
          rsi = 100 - 100/(1 + ag/al) if al > 0 else 100
          
          sma = sum(closes[-20:])/20
          std = (sum((c-sma)**2 for c in closes[-20:])/20)**0.5
          bb_u, bb_l = sma + 2*std, sma - 2*std
          
          score = 50
          signals = []
          if price > e20 > e50: score, signals = score + 15, signals + ['多头排列']
          elif price < e20 < e50: score, signals = score - 15, signals + ['空头排列']
          if rsi < 30: score, signals = score + 15, signals + ['RSI超卖']
          elif rsi > 70: score, signals = score - 15, signals + ['RSI超买']
          if price < bb_l: score, signals = score + 10, signals + ['触布林下轨']
          elif price > bb_u: score, signals = score - 10, signals + ['触布林上轨']
          
          score = max(0, min(100, score))
          sig = '做多' if score >= 60 else '做空' if score <= 40 else '观望'
          
          msg = {'msgtype': 'markdown', 'markdown': {'title': f'ETH信号 {sig}', 'text': f'''## ETH信号 {sig}

加密货币市场多空信号提醒

时间: {now.strftime(\"%Y-%m-%d %H:%M:%S\")}

### ETH价格
\${price:,.2f}

### 技术指标
| 指标 | 数值 | 信号 |
|:---:|---:|:---:|
| EMA20 | \${e20:,.2f} | {'多' if price > e20 else '空'} |
| EMA50 | \${e50:,.2f} | {'多' if price > e50 else '空'} |
| RSI | {rsi:.1f} | {'超卖' if rsi < 30 else '超买' if rsi > 70 else '中性'} |
| 布林上 | \${bb_u:,.2f} | - |
| 布林下 | \${bb_l:,.2f} | - |

### 信号
评分: {score}/100
方向: {sig}

依据: {', '.join(signals) if signals else '无'}

---
ETH Pro 15分钟分析'''}}
          
          req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
          r = json.loads(urllib.request.urlopen(req).read())
          print('ETH推送:', '成功' if r.get('errcode')==0 else f'失败{r}')
          "

  push-trading:
    runs-on: ubuntu-latest
    steps:
      - name: 模拟盘推送
        run: |
          python3 -c "
          import urllib.request, json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          now = datetime.now(timezone(timedelta(hours=8)))
          
          balance = 4012.68
          unrealized = 456.17
          positions = [
              {'sym': 'SOL', 'side': 'SHORT', 'qty': 61.97, 'entry': 92.26, 'lev': 30},
              {'sym': 'ETH', 'side': 'SHORT', 'qty': 1.35, 'entry': 2150.94, 'lev': 30},
              {'sym': 'BTC', 'side': 'SHORT', 'qty': 0.067, 'entry': 73257.78, 'lev': 30},
          ]
          
          pos_t = '| 币种 | 方向 | 数量 | 开仓价 | 杠杆 |\\n|:---:|:---:|---:|---:|:---:|\\n'
          for p in positions:
              pos_t += f\"| {p['sym']} | {p['side']} | {p['qty']:.4f} | \${p['entry']:,.2f} | {p['lev']}x |\\n\"
          
          msg = {'msgtype': 'markdown', 'markdown': {'title': '模拟盘日报', 'text': f'''## 模拟盘日报

加密货币市场多空信号提醒

时间: {now.strftime(\"%Y-%m-%d %H:%M:%S\")}

### 账户
- 总资产: \${balance:,.2f}
- 未实现盈亏: \${unrealized:+,.2f}
- 持仓数: {len(positions)}个

### 持仓
{pos_t}
### 统计
- 总交易: 15次
- 胜率: 60%
- 累计盈亏: +\$512.68

### 建议
设置止损控制风险

---
每30分钟自动推送'''}}
          
          req = urllib.request.Request(WEBHOOK, data=json.dumps(msg).encode(), headers={'Content-Type': 'application/json'})
          r = json.loads(urllib.request.urlopen(req).read())
          print('模拟盘推送:', '成功' if r.get('errcode')==0 else f'失败{r}')
          "
