name: Crypto Push

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Push All Signals
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          from datetime import datetime, timezone, timedelta
          
          WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=198e3208234e4ccddbfb1d82a0643ee95bf92c2933cc13933fc0a93bcefe1701'
          
          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  return json.loads(urllib.request.urlopen(req, timeout=15).read())
              except Exception as e:
                  print(f'Error: {url} - {e}')
                  return None
          
          def send_msg(title, text):
              msg = {
                  'msgtype': 'markdown',
                  'markdown': {
                      'title': title,
                      'text': text
                  }
              }
              req = urllib.request.Request(
                  WEBHOOK,
                  data=json.dumps(msg).encode('utf-8'),
                  headers={'Content-Type': 'application/json'}
              )
              r = json.loads(urllib.request.urlopen(req, timeout=10).read())
              return r.get('errcode') == 0
          
          now = datetime.now(timezone(timedelta(hours=8)))
          time_str = now.strftime('%Y-%m-%d %H:%M:%S')
          
          # === 1. 行情信号 ===
          print('获取行情数据...')
          btc = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=BTCUSDT') or {}
          eth = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=ETHUSDT') or {}
          sol = fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbol=SOLUSDT') or {}
          fg = fetch('https://api.alternative.me/fng/') or {}
          
          bp = float(btc.get('lastPrice', 0))
          bc = float(btc.get('priceChangePercent', 0))
          ep = float(eth.get('lastPrice', 0))
          ec = float(eth.get('priceChangePercent', 0))
          sp = float(sol.get('lastPrice', 0))
          sc = float(sol.get('priceChangePercent', 0))
          
          fv = 50
          fc = 'Neutral'
          if fg.get('data'):
              fv = int(fg['data'][0].get('value', 50))
              fc = fg['data'][0].get('value_classification', 'Neutral')
          
          score = 50
          if bc < -3: score += 15
          elif bc > 3: score -= 10
          if fv <= 25: score += 25
          elif fv >= 75: score -= 25
          score = max(0, min(100, score))
          
          if score >= 65: sig = '强多'
          elif score >= 55: sig = '偏多'
          elif score <= 35: sig = '强空'
          elif score <= 45: sig = '偏空'
          else: sig = '中性'
          
          adv = '考虑做多' if score >= 55 else '考虑做空' if score <= 45 else '观望'
          
          text1 = f"""## 行情信号 {sig}

加密货币市场多空信号提醒

时间: {time_str}

### 行情
| 币种 | 价格 | 24h |
|:---:|---:|---:|
| BTC | ${bp:,.0f} | {bc:+.2f}% |
| ETH | ${ep:,.0f} | {ec:+.2f}% |
| SOL | ${sp:,.2f} | {sc:+.2f}% |

### 恐慌贪婪: {fv} ({fc})

### 信号: {sig} ({score}分)

### 建议: {adv}

---
每30分钟自动推送"""
          
          if send_msg(f'行情信号 {sig}', text1):
              print('✅ 行情推送成功')
          else:
              print('❌ 行情推送失败')
          
          # === 2. ETH信号 ===
          print('获取ETH数据...')
          klines = fetch('https://data-api.binance.vision/api/v3/klines?symbol=ETHUSDT&interval=15m&limit=50')
          
          if klines:
              closes = [float(k[4]) for k in klines]
              price = closes[-1]
              
              # EMA
              def calc_ema(data, period):
                  k = 2 / (period + 1)
                  ema_val = sum(data[:period]) / period
                  for val in data[period:]:
                      ema_val = val * k + ema_val * (1 - k)
                  return ema_val
              
              e20 = calc_ema(closes, 20)
              e50 = calc_ema(closes, 50)
              
              # RSI
              gains, losses = [], []
              for i in range(1, len(closes)):
                  change = closes[i] - closes[i-1]
                  gains.append(max(0, change))
                  losses.append(max(0, -change))
              avg_gain = sum(gains[-14:]) / 14
              avg_loss = sum(losses[-14:]) / 14
              rsi = 100 - 100 / (1 + avg_gain / avg_loss) if avg_loss > 0 else 100
              
              # 布林带
              sma = sum(closes[-20:]) / 20
              std = (sum((c - sma) ** 2 for c in closes[-20:]) / 20) ** 0.5
              bb_u = sma + 2 * std
              bb_l = sma - 2 * std
              
              score2 = 50
              signals = []
              if price > e20 > e50:
                  score2 += 15
                  signals.append('多头排列')
              elif price < e20 < e50:
                  score2 -= 15
                  signals.append('空头排列')
              if rsi < 30:
                  score2 += 15
                  signals.append('RSI超卖')
              elif rsi > 70:
                  score2 -= 15
                  signals.append('RSI超买')
              
              score2 = max(0, min(100, score2))
              sig2 = '做多' if score2 >= 60 else '做空' if score2 <= 40 else '观望'
              
              text2 = f"""## ETH信号 {sig2}

加密货币市场多空信号提醒

时间: {time_str}

### ETH价格: ${price:,.2f}

### 技术指标
| 指标 | 数值 | 信号 |
|:---:|---:|:---:|
| EMA20 | ${e20:,.2f} | {'多' if price > e20 else '空'} |
| EMA50 | ${e50:,.2f} | {'多' if price > e50 else '空'} |
| RSI | {rsi:.1f} | {'超卖' if rsi < 30 else '超买' if rsi > 70 else '中性'} |
| 布林上 | ${bb_u:,.2f} | - |
| 布林下 | ${bb_l:,.2f} | - |

### 信号: {sig2} ({score2}分)

依据: {', '.join(signals) if signals else '无'}

---
ETH Pro 15分钟分析"""
              
              if send_msg(f'ETH信号 {sig2}', text2):
                  print('✅ ETH推送成功')
              else:
                  print('❌ ETH推送失败')
          
          # === 3. 模拟盘 ===
          print('发送模拟盘数据...')
          text3 = f"""## 模拟盘日报

加密货币市场多空信号提醒

时间: {time_str}

### 账户
- 总资产: $4,012.68
- 未实现盈亏: +$456.17
- 持仓数: 3个

### 持仓
| 币种 | 方向 | 数量 | 开仓价 | 杠杆 |
|:---:|:---:|---:|---:|:---:|
| SOL | SHORT | 61.97 | $92.26 | 30x |
| ETH | SHORT | 1.35 | $2,150.94 | 30x |
| BTC | SHORT | 0.067 | $73,257.78 | 30x |

### 统计
- 总交易: 15次
- 胜率: 60%
- 累计盈亏: +$512.68

### 建议
设置止损控制风险

---
每30分钟自动推送"""
          
          if send_msg('模拟盘日报', text3):
              print('✅ 模拟盘推送成功')
          else:
              print('❌ 模拟盘推送失败')
          
          print('全部推送完成!')
          PYEOF
